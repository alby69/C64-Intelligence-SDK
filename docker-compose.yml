services:
  # Interfaccia Gradio (C64-LLM AI Assistant)
  c64-ui:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: c64_intelligence_core
    volumes:
      - ./core:/app
      - ./tools:/app/tools
      - ./tutorial:/app/tutorial
      - ./data:/app/data
      - ./plugins:/app/plugins
    ports:
      - "7860:7860"
    environment:
      - PYTHONPATH=/app:/app/tools:/app/plugins
      - GGUF_MODEL_PATH=/app/data/models/qwen2.5-coder-1.5b.Q4_K_M.gguf
    command: python agent/agent_pro.py
    restart: unless-stopped

  # Pipeline di indicizzazione (WebCrawler/RAG)
  c64-pipeline:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: c64_intelligence_pipeline
    volumes:
      - ./core:/app
      - ./tools:/app/tools
      - ./tutorial:/app/tutorial
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app:/app/tools
    command: python agent/knowledge_base.py

  # Training LoRA
  c64-train:
    build:
      context: ./core
      dockerfile: Dockerfile
    volumes:
      - ./core:/app
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - OUTPUT_DIR=/app/data/models/c64-lora-pro
    deploy:
      resources:
        limits:
          memory: 16G
    command: python pipeline/train_lora.py /app/data/output/dataset_unified.jsonl

  # Centralized RAG / Knowledge Base Service (C64-KB-Agent)
  c64-kb-agent:
    build:
      context: ./kb-agent
      dockerfile: Dockerfile
    container_name: c64_kb_agent_service
    volumes:
      - ./kb-agent:/app
      - ./data:/app/data
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  # Visual Debugger & Simulation service (C64-Debugger)
  c64-debugger:
    build:
      context: ./debugger
      dockerfile: Dockerfile
    container_name: c64_debugger_service
    volumes:
      - ./debugger:/app
      - ./data:/app/data
    ports:
      - "5000:5000"
    command: python main_debugger.py
    restart: unless-stopped
