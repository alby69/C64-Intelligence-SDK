services:
  # ── TUI + Motore (comando principale) ──
  pyc64:
    build: .
    container_name: pyc64
    stdin_open: true
    tty: true
    working_dir: /app
    environment:
      - TERM=${TERM:-xterm-256color}
    volumes:
      - ./pyc64c:/app/pyc64c:ro
      - ./pyc64_ui:/app/pyc64_ui:ro
      - .:/app/source:ro
      - ./output:/app/output
    command: python3 -m pyc64_ui.app /app/source/test_python.c64

  # ── Solo compilazione batch ──
  compile:
    build: .
    container_name: pyc64-compile
    working_dir: /app
    volumes:
      - .:/app/source:ro
      - ./output:/app/output
    command: python3 /app/scripts/compile.py

  # ── Assembla .asm ──
  asm:
    build: .
    container_name: pyc64-asm
    working_dir: /app
    volumes:
      - .:/app/source:ro
      - ./output:/app/output
    entrypoint: ["python3", "/app/asm6502.py"]
    command: ["/app/source/examples/hello.asm", "-o", "/app/output/hello.prg", "-l"]

  # ── Emulatore VICE (opzionale) ──
  vice:
    image: python:3.12-slim
    container_name: vice64
    stdin_open: true
    tty: true
    volumes:
      - ./output:/app/output
    command: >
      bash -c "
        apt-get update && apt-get install -y vice &&
        echo 'Esegui: x64 /app/output/test_python.prg' &&
        tail -f /dev/null
      "
    profiles:
      - dont-start
