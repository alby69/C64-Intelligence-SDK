version: '3.8'

services:
  sdk-updater:
    build:
      context: .
      dockerfile: Dockerfile.updater
    container_name: c64_sdk_updater
    volumes:
      # Mount the entire repository to run git commands on the host files
      - .:/workspace
      # Mount host SSH keys and Git configuration to allow pull/push inside Docker
      - ~/.ssh:/root/.ssh:ro
      - ~/.gitconfig:/root/.gitconfig:ro
    working_dir: /workspace
    environment:
      - PYTHONUNBUFFERED=1
